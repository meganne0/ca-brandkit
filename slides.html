    <div class="slide-lightbox" id="slide-lightbox" hidden>

    <script type="module">
      import { initEditableSlideBoard } from "./js/components/slide-board.js?v=7";
      import { refreshImageTitleLayouts } from "./js/layouts.js?v=39";

      const board = document.getElementById("board");
      const source = document.getElementById("slide-source");
      const label = document.getElementById("slide-label");
      const lightbox = document.getElementById("slide-lightbox");
      const lightboxStage = document.getElementById("lightbox-stage");
      const lightboxLabel = document.getElementById("lightbox-label");
      const prev = document.getElementById("prev");
      const next = document.getElementById("next");

      const slides = [...source.querySelectorAll(".slide")];
      source.remove();
      let index = 0;

      const boardApi = initEditableSlideBoard({
        board,
        slides,
        showBgInMeta: true,
        onOpen: openLightbox,
        onChange: (count) => {
          label.textContent = `${count} slides`;
        },
      });

      function openLightbox(i) {
        if (!slides.length) return;
        index = Math.max(0, Math.min(slides.length - 1, i));
        lightbox.hidden = false;
        document.body.classList.add("slide-lightbox-open");
        renderLightbox();
      }

      function closeLightbox() {
        lightbox.hidden = true;
        lightboxStage.replaceChildren();
        document.body.classList.remove("slide-lightbox-open");
      }

      function renderLightbox() {
        const slide = slides[index];
        lightboxLabel.textContent = `${index + 1} / ${slides.length} · ${slide.dataset.layout} + ${slide.dataset.bg} · ${slide.dataset.title || ""}`;
        prev.disabled = index === 0;
        next.disabled = index === slides.length - 1;

        const clone = slide.cloneNode(true);
        clone.hidden = false;
        clone.removeAttribute("id");
        lightboxStage.replaceChildren(clone);
        // Fit after layout — hidden stages report clientWidth 0 → scale(0)
        requestAnimationFrame(() => {
          boardApi.fitSlide(clone, lightboxStage);
          refreshImageTitleLayouts(clone);
        });
      }

      prev.addEventListener("click", (e) => {
        e.stopPropagation();
        openLightbox(index - 1);
      });
      next.addEventListener("click", (e) => {
        e.stopPropagation();
        openLightbox(index + 1);
      });
      lightbox.querySelector(".slide-lightbox__backdrop").addEventListener("click", closeLightbox);

      window.addEventListener("keydown", (e) => {
        if (lightbox.hidden) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowRight" || e.key === " ") {
          e.preventDefault();
          if (index < slides.length - 1) openLightbox(index + 1);
        }
        if (e.key === "ArrowLeft") {
          e.preventDefault();
          if (index > 0) openLightbox(index - 1);
        }
      });

      window.addEventListener("resize", () => {
        if (!lightbox.hidden) {
          const clone = lightboxStage.querySelector(".slide");
          if (clone) boardApi.fitSlide(clone, lightboxStage);
        }
      });

      const params = new URLSearchParams(location.search);
      const startLayout = params.get("layout");
      if (startLayout) {
        const startIndex = slides.findIndex((s) => s.dataset.layout === startLayout);
        if (startIndex >= 0) openLightbox(startIndex);
      }
    </script>
